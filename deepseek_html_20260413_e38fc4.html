<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>⚡ TWTM NEBULA · PVP ТИР-ЛИСТ ⚡</title>
    
    <!-- Премиум шрифты + иконки -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        /* ============================================
           =            CSS ПЕРЕМЕННЫЕ И СБРОС         =
           ============================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-deep: #03050c;
            --bg-mid: #0a0f1c;
            --glass-core: rgba(8, 20, 36, 0.55);
            --glass-border: rgba(0, 230, 250, 0.35);
            --neon-cyan: #00f3ff;
            --neon-pink: #ff00aa;
            --neon-purple: #b000ff;
            --neon-gold: #ffd700;
            --text-glow: 0 0 12px currentColor;
            --card-shine: linear-gradient(125deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0) 100%);
            
            --font-primary: 'Space Grotesk', sans-serif;
            --font-display: 'Orbitron', sans-serif;
            --font-mono: 'Rajdhani', monospace;
            
            --transition-smooth: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
            --transition-glitch: all 0.15s step-end;
        }

        body.light {
            --bg-deep: #e3ecf5;
            --bg-mid: #cddef5;
            --glass-core: rgba(255, 255, 255, 0.65);
            --glass-border: rgba(20, 100, 220, 0.45);
            --neon-cyan: #0066ff;
            --neon-pink: #c2006b;
            --neon-purple: #6a00c2;
            --neon-gold: #b8860b;
            --text-glow: 0 0 8px rgba(0,100,255,0.3);
        }

        body {
            min-height: 100vh;
            background: var(--bg-deep);
            font-family: var(--font-primary);
            color: #ffffff;
            padding: 24px 20px;
            position: relative;
            overflow-x: hidden;
            transition: background 0.4s ease;
        }

        /* ===== АНИМИРОВАННЫЙ ФОН С ЧАСТИЦАМИ (CANVAS) ===== */
        #particleCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            opacity: 0.9;
        }

        body.light #particleCanvas {
            opacity: 0.4;
        }

        /* ===== ОСНОВНОЙ КОНТЕЙНЕР (ПОВЕРХ ЧАСТИЦ) ===== */
        .cosmic-wrapper {
            position: relative;
            z-index: 5;
            max-width: 1600px;
            margin: 0 auto;
        }

        /* ===== СТЕКЛЯННАЯ ОСНОВА С ГЛИТЧ-РАМКОЙ ===== */
        .glass-ship {
            background: var(--glass-core);
            backdrop-filter: blur(18px) saturate(180%);
            -webkit-backdrop-filter: blur(18px) saturate(180%);
            border: 2px solid var(--glass-border);
            border-radius: 48px;
            padding: 32px 30px 38px;
            box-shadow: 0 0 50px rgba(0, 243, 255, 0.2), inset 0 0 30px rgba(0, 243, 255, 0.05);
            position: relative;
            overflow: hidden;
            transition: var(--transition-smooth);
        }

        .glass-ship::before {
            content: "";
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            border-radius: 50px;
            padding: 2px;
            background: linear-gradient(45deg, var(--neon-cyan), var(--neon-pink), var(--neon-purple), var(--neon-cyan));
            background-size: 400% 400%;
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0.6;
            animation: borderGlitch 6s infinite alternate;
            pointer-events: none;
            z-index: 2;
        }

        @keyframes borderGlitch {
            0% { background-position: 0% 0%; opacity: 0.4; }
            20% { background-position: 30% 20%; opacity: 0.8; }
            40% { background-position: 70% 80%; opacity: 0.3; }
            60% { background-position: 100% 50%; opacity: 0.9; }
            80% { background-position: 20% 90%; opacity: 0.5; }
            100% { background-position: 0% 0%; opacity: 0.6; }
        }

        /* ===== ХЕДЕР С ЭПИЧНЫМ НАЗВАНИЕМ ===== */
        .header-section {
            display: flex;
            flex-wrap: wrap;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 30px;
            position: relative;
            z-index: 10;
        }

        .title-block {
            display: flex;
            flex-direction: column;
        }

        .main-title {
            font-family: var(--font-display);
            font-weight: 900;
            font-size: clamp(36px, 9vw, 64px);
            letter-spacing: 6px;
            text-transform: uppercase;
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-pink), var(--neon-gold));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 30px var(--neon-cyan);
            animation: titlePulse 3s infinite;
            line-height: 1.1;
        }

        @keyframes titlePulse {
            0%, 100% { filter: drop-shadow(0 0 15px var(--neon-cyan)); }
            50% { filter: drop-shadow(0 0 30px var(--neon-pink)); }
        }

        .subtitle-glitch {
            font-family: var(--font-mono);
            font-weight: 500;
            font-size: 18px;
            color: #b0d0ff;
            letter-spacing: 2px;
            margin-top: 6px;
            text-shadow: 0 0 8px var(--neon-cyan);
            position: relative;
            display: inline-block;
        }

        .subtitle-glitch::after {
            content: "MINECRAFT 1.21.1 · PVP LEGACY";
            position: absolute;
            left: 2px;
            top: 0;
            color: var(--neon-pink);
            opacity: 0.4;
            clip-path: inset(0 0 0 0);
            animation: glitchText 4s infinite step-start;
        }

        @keyframes glitchText {
            0%, 100% { clip-path: inset(0 0 80% 0); }
            20% { clip-path: inset(40% 0 20% 0); }
            40% { clip-path: inset(90% 0 5% 0); }
            60% { clip-path: inset(10% 0 60% 0); }
            80% { clip-path: inset(70% 0 10% 0); }
        }

        /* ===== ПАНЕЛЬ УПРАВЛЕНИЯ (ПОИСК, ТЕМА, СТАТИСТИКА) ===== */
        .command-deck {
            display: flex;
            gap: 16px;
            align-items: center;
            flex-wrap: wrap;
        }

        .search-container {
            position: relative;
            width: 300px;
        }

        .search-icon {
            position: absolute;
            left: 18px;
            top: 15px;
            color: var(--neon-cyan);
            font-size: 18px;
            filter: drop-shadow(0 0 6px);
            z-index: 2;
        }

        #searchInput {
            width: 100%;
            background: rgba(2, 10, 20, 0.7);
            border: 2px solid var(--glass-border);
            border-radius: 60px;
            padding: 14px 24px 14px 52px;
            font-family: var(--font-primary);
            font-weight: 500;
            font-size: 16px;
            color: #fff;
            backdrop-filter: blur(12px);
            box-shadow: inset 0 2px 8px #00000055, 0 0 18px var(--neon-cyan);
            transition: var(--transition-smooth);
            letter-spacing: 0.3px;
        }

        #searchInput:focus {
            outline: none;
            border-color: var(--neon-pink);
            box-shadow: inset 0 2px 10px #000, 0 0 30px var(--neon-pink);
        }

        #searchInput::placeholder {
            color: #9bb5d4;
            font-weight: 300;
        }

        .theme-orb {
            width: 56px;
            height: 56px;
            background: rgba(0, 20, 40, 0.6);
            backdrop-filter: blur(8px);
            border: 2px solid var(--glass-border);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            color: var(--neon-gold);
            cursor: pointer;
            box-shadow: 0 0 25px var(--neon-purple);
            transition: var(--transition-smooth);
            transform: rotate(0deg);
        }

        .theme-orb:hover {
            transform: scale(1.1) rotate(15deg);
            border-color: var(--neon-pink);
            color: var(--neon-pink);
            box-shadow: 0 0 40px var(--neon-pink);
        }

        /* ===== ВИДЖЕТ СТАТИСТИКИ (ВЕРХНЯЯ ПАНЕЛЬ) ===== */
        .stats-panel {
            display: flex;
            gap: 30px;
            margin: 28px 0 30px;
            flex-wrap: wrap;
        }

        .stat-card {
            flex: 1 1 180px;
            background: rgba(0, 15, 30, 0.5);
            backdrop-filter: blur(12px);
            border: 1.5px solid var(--glass-border);
            border-radius: 32px;
            padding: 20px 24px;
            box-shadow: inset 0 0 20px #00000055, 0 10px 25px #00000060;
            transition: var(--transition-smooth);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            border-color: var(--neon-cyan);
            box-shadow: 0 0 40px var(--neon-cyan);
        }

        .stat-icon {
            font-size: 42px;
            color: var(--neon-cyan);
            text-shadow: 0 0 20px;
        }

        .stat-content h3 {
            font-family: var(--font-mono);
            font-size: 15px;
            font-weight: 400;
            color: #aac8ff;
            letter-spacing: 2px;
        }

        .stat-value {
            font-family: var(--font-display);
            font-size: 36px;
            font-weight: 700;
            color: white;
            text-shadow: 0 0 18px var(--neon-gold);
            line-height: 1.2;
        }

        /* ===== ТАБЛИЦА ТИР-ЛИСТА (ЭПИЧЕСКАЯ) ===== */
        .table-realm {
            border-radius: 30px;
            overflow: hidden;
            margin: 15px 0 10px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 0 50px #00000080, inset 0 0 20px #0000004d;
        }

        .table-scroll {
            overflow-x: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--neon-cyan) #00101f;
        }

        .table-scroll::-webkit-scrollbar {
            height: 8px;
        }

        .table-scroll::-webkit-scrollbar-thumb {
            background: var(--neon-cyan);
            border-radius: 10px;
            box-shadow: 0 0 10px var(--neon-cyan);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 900px;
            font-family: var(--font-primary);
        }

        th {
            text-align: left;
            padding: 22px 20px;
            background: rgba(0, 5, 15, 0.8);
            backdrop-filter: blur(16px);
            font-family: var(--font-display);
            font-weight: 600;
            font-size: 16px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--neon-cyan);
            border-bottom: 3px solid var(--neon-pink);
            text-shadow: 0 0 10px;
            white-space: nowrap;
        }

        td {
            padding: 18px 20px;
            border-bottom: 1px solid rgba(0, 255, 255, 0.1);
            background: rgba(2, 15, 28, 0.4);
            backdrop-filter: blur(4px);
            font-weight: 500;
            transition: var(--transition-smooth);
        }

        tr:hover td {
            background: rgba(0, 200, 255, 0.12);
            backdrop-filter: blur(12px);
            box-shadow: inset 0 0 25px #00aaff33;
        }

        /* Аватар + имя */
        .player-id {
            display: flex;
            align-items: center;
            gap: 18px;
        }

        .avatar-frame {
            position: relative;
            width: 48px;
            height: 48px;
            border-radius: 16px;
            background: linear-gradient(145deg, var(--neon-cyan), var(--neon-purple));
            padding: 2px;
            box-shadow: 0 0 20px var(--neon-cyan);
        }

        .avatar-frame img {
            width: 100%;
            height: 100%;
            border-radius: 14px;
            display: block;
            border: 1px solid #ffffff40;
        }

        .player-name-glow {
            font-weight: 700;
            font-size: 18px;
            color: #ffffff;
            text-shadow: 0 0 12px var(--neon-cyan);
            letter-spacing: 0.5px;
        }

        /* Ранговая плашка с анимацией */
        .rank-crystal {
            display: inline-block;
            padding: 8px 20px;
            border-radius: 40px;
            font-family: var(--font-display);
            font-weight: 800;
            font-size: 15px;
            letter-spacing: 1.5px;
            backdrop-filter: blur(8px);
            background: rgba(10, 20, 40, 0.7);
            border: 1px solid;
            box-shadow: inset 0 0 10px #00000088, 0 0 20px currentColor;
            text-transform: uppercase;
            transition: var(--transition-smooth);
        }

        .rank-ht {
            border-color: #ff80bf;
            color: #ffe6f2;
            text-shadow: 0 0 15px #ff00aa;
            box-shadow: 0 0 25px #ff00aa;
        }

        .rank-lt {
            border-color: #6eb5ff;
            color: #e2f0ff;
            text-shadow: 0 0 15px #0088ff;
            box-shadow: 0 0 25px #0088ff;
        }

        .kd-number {
            font-family: var(--font-mono);
            font-weight: 800;
            font-size: 20px;
            color: var(--neon-gold);
            text-shadow: 0 0 15px #ffaa00;
        }

        /* Скелетон загрузки */
        .skeleton-row td {
            padding: 22px 20px;
        }

        .skeleton {
            background: linear-gradient(90deg, #1a2a40 25%, #2a4060 50%, #1a2a40 75%);
            background-size: 200% 100%;
            animation: shimmer 1.2s infinite;
            border-radius: 30px;
            height: 24px;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* ===== ПАНЕЛЬ РАНГОВОГО РАСПРЕДЕЛЕНИЯ (CANVAS) ===== */
        .rank-distribution {
            margin: 40px 0 20px;
            padding: 24px 20px;
            background: rgba(0, 8, 20, 0.45);
            backdrop-filter: blur(12px);
            border-radius: 36px;
            border: 1.5px solid var(--glass-border);
        }

        .distro-title {
            font-family: var(--font-display);
            font-size: 24px;
            margin-bottom: 20px;
            color: var(--neon-cyan);
            text-shadow: 0 0 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        canvas#rankChart {
            width: 100%;
            height: auto;
            max-height: 120px;
            display: block;
        }

        /* ===== ФУТЕР С АВТООБНОВЛЕНИЕМ ===== */
        .footer-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 30px;
            font-family: var(--font-mono);
            color: #b8d0ff;
        }

        .update-sync {
            display: flex;
            align-items: center;
            gap: 18px;
        }

        .pulse-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--neon-cyan);
            box-shadow: 0 0 20px var(--neon-cyan);
            animation: pulseDot 1.8s infinite;
        }

        @keyframes pulseDot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(1.2); }
        }

        .demo-badge {
            background: #ff00aa40;
            border: 1px solid var(--neon-pink);
            padding: 8px 22px;
            border-radius: 60px;
            font-weight: 700;
            backdrop-filter: blur(12px);
            text-transform: uppercase;
            box-shadow: 0 0 25px var(--neon-pink);
        }

        /* Адаптивность */
        @media (max-width: 700px) {
            body { padding: 12px; }
            .glass-ship { padding: 20px 16px; }
            .search-container { width: 100%; }
            .command-deck { width: 100%; }
        }
    </style>
</head>
<body>

<!-- Живой фон из частиц -->
<canvas id="particleCanvas"></canvas>

<div class="cosmic-wrapper">
    <div class="glass-ship">
        
        <!-- ХЕДЕР -->
        <div class="header-section">
            <div class="title-block">
                <div class="main-title">NEBULA PVP</div>
                <div class="subtitle-glitch">TWTM · MINECRAFT 1.21.1 · PVP LEGACY</div>
            </div>
            <div class="command-deck">
                <div class="search-container">
                    <i class="fas fa-search search-icon"></i>
                    <input type="text" id="searchInput" placeholder="Поиск игрока..." autocomplete="off">
                </div>
                <div class="theme-orb" id="themeToggle">
                    <i class="fas fa-moon-stars"></i>
                </div>
            </div>
        </div>

        <!-- ВИДЖЕТЫ СТАТИСТИКИ -->
        <div class="stats-panel">
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-users"></i></div>
                <div class="stat-content">
                    <h3>ИГРОКОВ</h3>
                    <div class="stat-value" id="totalPlayers">--</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-skull"></i></div>
                <div class="stat-content">
                    <h3>ВСЕГО УБИЙСТВ</h3>
                    <div class="stat-value" id="totalKills">--</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-heart-crack"></i></div>
                <div class="stat-content">
                    <h3>СРЕДНИЙ K/D</h3>
                    <div class="stat-value" id="avgKD">--</div>
                </div>
            </div>
        </div>

        <!-- ТАБЛИЦА -->
        <div class="table-realm">
            <div class="table-scroll">
                <table>
                    <thead>
                        <tr>
                            <th># РАНГ</th>
                            <th>ИГРОК</th>
                            <th>УБИЙСТВА</th>
                            <th>СМЕРТИ</th>
                            <th>K/D RATIO</th>
                            <th>ТИТУЛ</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <!-- Динамический рендер -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- ГРАФИК РАНГОВ -->
        <div class="rank-distribution">
            <div class="distro-title"><i class="fas fa-chart-pie"></i> РАСПРЕДЕЛЕНИЕ РАНГОВ (HT / LT)</div>
            <canvas id="rankChart" width="800" height="100"></canvas>
        </div>

        <!-- ФУТЕР -->
        <div class="footer-panel">
            <div class="update-sync">
                <span class="pulse-dot"></span>
                <span id="updateTimestamp"><i class="far fa-clock"></i> Обновление: --:--:--</span>
                <span><i class="fas fa-sync-alt fa-spin" style="margin:0 5px;"></i> авто 45с</span>
            </div>
            <div id="demoIndicator" class="demo-badge" style="display:none;">📀 DEMO MODE</div>
        </div>
    </div>
</div>

<script>
    (function(){
        "use strict";
        // ------------------------------
        // EPIC CONFIG
        // ------------------------------
        const STATS_URL = '/stats.json';
        const REFRESH_INTERVAL = 45000;
        const DEMO_ENABLED = true;
        
        const RANK_RULES = [
            { min: 10.0, rank: 'HT1', type: 'ht' },
            { min: 5.0,  rank: 'HT2', type: 'ht' },
            { min: 3.0,  rank: 'HT3', type: 'ht' },
            { min: 2.0,  rank: 'HT4', type: 'ht' },
            { min: 1.5,  rank: 'HT5', type: 'ht' },
            { min: 1.0,  rank: 'LT1', type: 'lt' },
            { min: 0.8,  rank: 'LT2', type: 'lt' },
            { min: 0.6,  rank: 'LT3', type: 'lt' },
            { min: 0.4,  rank: 'LT4', type: 'lt' },
            { min: 0.0,  rank: 'LT5', type: 'lt' }
        ];

        const DEMO_DATA = {
            "dima_knight": { kills: 1240, deaths: 201 },
            "WariX": { kills: 980, deaths: 210 },
            "xX_Blaze_Xx": { kills: 450, deaths: 120 },
            "CrystalPvP": { kills: 2200, deaths: 190 },
            "Notch_": { kills: 80, deaths: 350 },
            "EnderStar": { kills: 620, deaths: 400 },
            "FuryLegend": { kills: 1550, deaths: 300 },
            "SilentSword": { kills: 5, deaths: 18 },
            "NebulaGod": { kills: 3000, deaths: 150 },
            "Zephyr": { kills: 720, deaths: 500 },
            "VortexX": { kills: 80, deaths: 5 }
        };

        // ------------------------------
        // ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ
        // ------------------------------
        let players = [];
        let isDemo = false;
        let lastUpdate = new Date();
        const body = document.body;
        const tbody = document.getElementById('tableBody');
        const searchInput = document.getElementById('searchInput');
        const themeToggle = document.getElementById('themeToggle');
        const totalPlayersSpan = document.getElementById('totalPlayers');
        const totalKillsSpan = document.getElementById('totalKills');
        const avgKDSpan = document.getElementById('avgKD');
        const updateTimestampSpan = document.getElementById('updateTimestamp');
        const demoIndicator = document.getElementById('demoIndicator');
        const rankChartCanvas = document.getElementById('rankChart');
        
        // ------------------------------
        // ЧАСТИЦЫ ФОНА (CANVAS)
        // ------------------------------
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let particles = [];
        
        function initParticles() {
            const count = 120;
            particles = [];
            for (let i = 0; i < count; i++) {
                particles.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    radius: Math.random() * 3 + 1,
                    speedX: (Math.random() - 0.5) * 0.4,
                    speedY: (Math.random() - 0.5) * 0.4,
                    color: `hsla(${180 + Math.random() * 100}, 80%, 60%, ${0.2+Math.random()*0.3})`
                });
            }
        }
        
        function resizeCanvas() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            initParticles();
        }
        
        function drawParticles() {
            if (!ctx) return;
            ctx.clearRect(0, 0, width, height);
            particles.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.shadowColor = '#00f3ff';
                ctx.shadowBlur = 12;
                ctx.fill();
                
                p.x += p.speedX;
                p.y += p.speedY;
                if (p.x < 0) p.x = width;
                if (p.x > width) p.x = 0;
                if (p.y < 0) p.y = height;
                if (p.y > height) p.y = 0;
            });
            requestAnimationFrame(drawParticles);
        }
        
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        drawParticles();

        // ------------------------------
        // ТЕМА
        // ------------------------------
        function initTheme() {
            const saved = localStorage.getItem('nebula-theme');
            if (saved === 'light') {
                body.classList.add('light');
                themeToggle.innerHTML = '<i class="fas fa-sun"></i>';
            } else {
                body.classList.remove('light');
                themeToggle.innerHTML = '<i class="fas fa-moon-stars"></i>';
            }
        }
        themeToggle.addEventListener('click', () => {
            if (body.classList.contains('light')) {
                body.classList.remove('light');
                themeToggle.innerHTML = '<i class="fas fa-moon-stars"></i>';
                localStorage.setItem('nebula-theme', 'dark');
            } else {
                body.classList.add('light');
                themeToggle.innerHTML = '<i class="fas fa-sun"></i>';
                localStorage.setItem('nebula-theme', 'light');
            }
        });

        // ------------------------------
        // РАСЧЁТ KD И РАНГА
        // ------------------------------
        function computeKD(k, d) { return (k / (d || 1)); }
        function getRank(kd) {
            for (let r of RANK_RULES) if (kd > r.min) return r;
            return { rank: 'LT5', type: 'lt' };
        }

        // ------------------------------
        // ОБРАБОТКА ДАННЫХ
        // ------------------------------
        function processData(raw) {
            const arr = [];
            for (let [name, stats] of Object.entries(raw)) {
                const kills = Number(stats.kills) || 0;
                const deaths = Number(stats.deaths) || 0;
                const kd = computeKD(kills, deaths);
                const rank = getRank(kd);
                arr.push({ name, kills, deaths, kd, rank: rank.rank, type: rank.type });
            }
            arr.sort((a,b) => b.kd - a.kd);
            return arr;
        }

        // ------------------------------
        // РЕНДЕР ТАБЛИЦЫ (СКЕЛЕТОН ПРИ ЗАГРУЗКЕ)
        // ------------------------------
        function renderSkeleton() {
            let html = '';
            for (let i=0; i<6; i++) {
                html += `<tr class="skeleton-row"><td><div class="skeleton" style="width:40px"></div></td><td><div class="skeleton" style="width:160px"></div></td><td><div class="skeleton" style="width:70px"></div></td><td><div class="skeleton" style="width:70px"></div></td><td><div class="skeleton" style="width:80px"></div></td><td><div class="skeleton" style="width:90px"></div></td></tr>`;
            }
            tbody.innerHTML = html;
        }

        function renderTable(filter='') {
            const f = filter.toLowerCase();
            const filtered = f ? players.filter(p => p.name.toLowerCase().includes(f)) : players;
            
            if (filtered.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;padding:50px;"><i class="fas fa-user-astronaut"></i> Игроки не найдены</td></tr>`;
                return;
            }
            
            let html = '';
            filtered.forEach((p, idx) => {
                const rankClass = p.type === 'ht' ? 'rank-ht' : 'rank-lt';
                const avatar = `https://mc-heads.net/avatar/${p.name}/48`;
                html += `<tr>
                    <td><span style="font-weight:800;font-size:20px;">#${idx+1}</span></td>
                    <td><div class="player-id"><div class="avatar-frame"><img src="${avatar}" onerror="this.src='https://mc-heads.net/avatar/MHF_Steve/48'"></div><span class="player-name-glow">${escapeHtml(p.name)}</span></div></td>
                    <td>${p.kills.toLocaleString()}</td>
                    <td>${p.deaths.toLocaleString()}</td>
                    <td><span class="kd-number">${p.kd.toFixed(2)}</span></td>
                    <td><span class="rank-crystal ${rankClass}">${p.rank}</span></td>
                </tr>`;
            });
            tbody.innerHTML = html;
        }

        function escapeHtml(t) { return String(t).replace(/[&<>"]/g, function(c){ return { '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]; }); }

        // ------------------------------
        // ОБНОВЛЕНИЕ СТАТИСТИКИ
        // ------------------------------
        function updateStatsAndChart() {
            const total = players.length;
            const totalK = players.reduce((s,p)=> s + p.kills, 0);
            const avg = players.length ? (players.reduce((s,p)=> s + p.kd, 0) / players.length).toFixed(2) : '0.00';
            totalPlayersSpan.textContent = total;
            totalKillsSpan.textContent = totalK.toLocaleString();
            avgKDSpan.textContent = avg;
            
            // Диаграмма
            if (!rankChartCanvas) return;
            const chartCtx = rankChartCanvas.getContext('2d');
            const w = rankChartCanvas.width = rankChartCanvas.clientWidth || 800;
            const h = 100;
            rankChartCanvas.height = h;
            
            const counts = { ht:0, lt:0 };
            players.forEach(p => counts[p.type]++);
            const totalCount = players.length || 1;
            const htWidth = (counts.ht / totalCount) * w;
            
            chartCtx.clearRect(0,0,w,h);
            // HT бар
            chartCtx.fillStyle = '#ff66c4';
            chartCtx.shadowColor = '#ff00aa';
            chartCtx.shadowBlur = 20;
            chartCtx.fillRect(0, 20, htWidth, h-40);
            // LT бар
            chartCtx.fillStyle = '#6cc3ff';
            chartCtx.shadowColor = '#0088ff';
            chartCtx.fillRect(htWidth, 20, w - htWidth, h-40);
            chartCtx.shadowBlur = 0;
            chartCtx.font = 'bold 14px Orbitron';
            chartCtx.fillStyle = '#fff';
            chartCtx.fillText(`HT: ${counts.ht}`, 20, 50);
            chartCtx.fillText(`LT: ${counts.lt}`, htWidth + 20, 50);
        }

        // ------------------------------
        // ЗАГРУЗКА ДАННЫХ
        // ------------------------------
        async function fetchData() {
            renderSkeleton();
            let raw = null;
            let demoUsed = false;
            try {
                const resp = await fetch(STATS_URL, { cache: 'no-cache' });
                if (!resp.ok) throw new Error('Статус '+resp.status);
                raw = await resp.json();
                if (!raw || typeof raw !== 'object') throw new Error('Формат');
            } catch(e) {
                console.warn('DEMO активирован:', e);
                if (DEMO_ENABLED) { raw = DEMO_DATA; demoUsed = true; }
                else { tbody.innerHTML = `<tr><td colspan="6" style="color:red;padding:40px;">Ошибка загрузки</td></tr>`; return; }
            }
            players = processData(raw);
            isDemo = demoUsed;
            demoIndicator.style.display = isDemo ? 'inline-block' : 'none';
            lastUpdate = new Date();
            updateTimestampSpan.innerHTML = `<i class="far fa-clock"></i> Обновлено: ${lastUpdate.toLocaleTimeString()}`;
            renderTable(searchInput.value);
            updateStatsAndChart();
        }

        // ------------------------------
        // ПОИСК
        // ------------------------------
        searchInput.addEventListener('input', (e) => renderTable(e.target.value));

        // ------------------------------
        // АВТООБНОВЛЕНИЕ + СТАРТ
        // ------------------------------
        async function loop() {
            await fetchData();
            setTimeout(loop, REFRESH_INTERVAL);
        }
        
        initTheme();
        loop();
    })();
</script>
</body>
</html>
